<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lissajous Drift – Pure SVG Gradient Trail</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #080808;
      color: #f0f0f0;
      font-family: Inter, system-ui, sans-serif;
    }
    .wrapper {
      display: grid;
      gap: 24px;
      justify-items: center;
      padding: 32px;
    }
    .frame {
      width: min(72vmin, 420px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }
    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .meta { text-align: center; }
    .title { font-size: 22px; font-weight: 700; }
    .tag {
      margin-top: 6px;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    #group {
      transform-origin: 50px 50px;
      animation: breathe 5.4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.95); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="frame">
      <svg viewBox="0 0 100 100" fill="none">
        <g id="group">
          <path id="ghost" stroke="currentColor" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round" opacity="0.07" />
        </g>
      </svg>
    </div>
    <div class="meta">
      <div class="title">Lissajous Drift</div>
      <div class="tag">x = sin(3t + &pi;/2), y = sin(4t)</div>
    </div>
  </div>

  <script>
    const TRAIL_SPAN = 0.34;
    const DURATION = 6000;
    const STEPS = 480;

    // Lissajous Drift parameters (from original)
    const AMP = 28.5;
    const AX = 3;
    const BY = 4;
    const PHASE = 1.57;
    const Y_SCALE = 0.92;

    function point(progress) {
      const t = progress * Math.PI * 2;
      return {
        x: 50 + Math.sin(AX * t + PHASE) * AMP,
        y: 50 + Math.sin(BY * t) * (AMP * Y_SCALE),
      };
    }

    // Build SVG path
    const d = Array.from({ length: STEPS + 1 }, (_, i) => {
      const p = point(i / STEPS);
      return `${i === 0 ? "M" : "L"}${p.x.toFixed(2)},${p.y.toFixed(2)}`;
    }).join(" ") + " Z";

    const ghost = document.getElementById("ghost");
    const group = document.getElementById("group");
    ghost.setAttribute("d", d);

    const totalLen = ghost.getTotalLength();

    // Single solid trail with rounded ends
    const trailLen = TRAIL_SPAN * totalLen;
    const trail = ghost.cloneNode();
    trail.removeAttribute("id");
    trail.setAttribute("opacity", "0.9");
    trail.setAttribute("stroke-width", "4.5");
    trail.setAttribute("stroke-linecap", "round");
    trail.style.strokeDasharray = `${trailLen.toFixed(2)} ${(totalLen - trailLen).toFixed(2)}`;
    group.appendChild(trail);

    trail.animate(
      [
        { strokeDashoffset: 0 },
        { strokeDashoffset: -totalLen },
      ],
      { duration: DURATION, iterations: Infinity, easing: "linear" }
    );
  </script>
</body>
</html>
